<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern-page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="Main-Container">
      <h1>This is a modern Form Page</h1>
      <p>Lets begin building a form!</p>
      <form class="form-container">
        <h4 class="mad-max">Fill The form Below</h4>

        <div class="form-group-1">
            <div class="f-c">
                <label for="Firstname">FirstName</label>
                <input
                  type="text"
                  id="firstname"
                  name="firstname"
                  placeholder="Firstname"
                />
            </div>

         <div class="f-c">
             <label for="Surname"
           >LastName</label>
           <input type="text"
             id="lastname"
             name="lastname"
             placeholder="Lastname"
           >
         </div>
         

        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            name="email"
            placeholder="john@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="Phone">Phone-Number</label>
          <input type="tel" id="tel" name="tel" placeholder="Phone Number" />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="phy">Physics</option>
            <option value="Math">Mathematics</option>
            <option value="Biology">Biology</option>
            <option value="Solarized">Magoscopy</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>
        </div>
      </form>


      <button type="submit" class="submit-btn">Send Message</button>
    </div>
  </body>
</html>
